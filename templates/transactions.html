{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h1><i class="fas fa-list"></i> Transactions</h1>
    <p class="page-subtitle">Manage all credit and debit entries</p>
</div>

<div class="toolbar">
    <div class="toolbar-row">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="search-input" placeholder="Search description or staff..." autocomplete="off">
        </div>
        <div class="toolbar-actions">
            <div class="filter-group">
                <select id="filter-type">
                    <option value="">All Types</option>
                    <option value="credit">Credits</option>
                    <option value="debit">Debits</option>
                </select>
                <select id="filter-status">
                    <option value="">All Status</option>
                    <option value="settled">Settled</option>
                    <option value="pending">Pending</option>
                </select>
                <select id="filter-scanned">
                    <option value="">All Scanned</option>
                    <option value="yes">Scanned</option>
                    <option value="no">Not Scanned</option>
                </select>
                <select id="filter-reported">
                    <option value="">All Reported</option>
                    <option value="yes">Reported</option>
                    <option value="no">Not Reported</option>
                </select>
                <select id="sort-by">
                    <option value="date">Date</option>
                    <option value="amount">Amount</option>
                    <option value="description">Description</option>
                </select>
                <select id="sort-order">
                    <option value="desc">Newest</option>
                    <option value="asc">Oldest</option>
                </select>
            </div>
            <button class="btn btn-primary" id="add-btn">
                <i class="fas fa-plus"></i> Add
            </button>
        </div>
    </div>
</div>

<div class="txn-count" id="txn-count"></div>

<div class="txn-list" id="txn-list">
    <div class="loading">Loading...</div>
</div>

<div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
        <div class="modal-header">
            <h3 id="modal-title">Add Transaction</h3>
            <button class="modal-close" id="modal-close">&times;</button>
        </div>
        <form id="txn-form" autocomplete="off">
            <input type="hidden" id="txn-id" value="">
            <div class="form-row">
                <div class="form-group">
                    <label>Type</label>
                    <div class="type-toggle">
                        <button type="button" class="type-btn active" data-value="debit" id="type-debit">
                            <i class="fas fa-arrow-up"></i> Debit
                        </button>
                        <button type="button" class="type-btn" data-value="credit" id="type-credit">
                            <i class="fas fa-arrow-down"></i> Credit
                        </button>
                    </div>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="amount">Amount (MVR)</label>
                    <input type="number" id="amount" name="amount" step="0.01" min="0.01" required placeholder="0.00">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" name="description" required placeholder="What is this for?">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="staff_name">Staff Name</label>
                    <input type="text" id="staff_name" name="staff_name" placeholder="Who is this for?">
                </div>
            </div>
            <div class="form-row form-row-half">
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date">
                </div>
                <div class="form-group" id="status-group">
                    <label for="status">Status</label>
                    <select id="status" name="status">
                        <option value="settled">Settled</option>
                        <option value="pending">Pending</option>
                    </select>
                </div>
            </div>
            <div class="form-row" id="receipt-group">
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="receipt" name="receipt" value="yes">
                        <span>Receipt provided</span>
                    </label>
                </div>
            </div>
            <div class="form-row form-row-half" id="bill-group">
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="scanned" name="scanned" value="yes">
                        <span><i class="fas fa-scanner"></i> Scanned</span>
                    </label>
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="reported" name="reported" value="yes">
                        <span><i class="fas fa-upload"></i> Reported to SEB</span>
                    </label>
                </div>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-outline" id="form-cancel">Cancel</button>
                <button type="submit" class="btn btn-primary" id="form-submit">
                    <i class="fas fa-check"></i> Save
                </button>
            </div>
        </form>
    </div>
</div>

<div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-box">
        <h3>Delete Transaction?</h3>
        <p id="confirm-text">Are you sure you want to delete this transaction?</p>
        <div class="confirm-actions">
            <button class="btn btn-outline" id="confirm-cancel">Cancel</button>
            <button class="btn btn-danger" id="confirm-yes">Delete</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    loadTransactions();
    setupTransactionEvents();
});
</script>
{% endblock %}
