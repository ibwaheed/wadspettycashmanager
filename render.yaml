services:
  - type: web
    name: petty-cash-manager
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: APP_USERNAME
        value: admin
      - key: APP_PASSWORD
        value: admin123
